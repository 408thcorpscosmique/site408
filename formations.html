function showAvatar(user) {
  avatarWrap.classList.add("visible");
  const name = user.displayName || user.email.split("@")[0];
  usernameEl.textContent = name;
  if (user.photoURL) {
    avatarImg.src = user.photoURL;
    avatarImg.alt = name;
    avatarImg.style.display = "block";
    avatarFall.style.display = "none";
  } else {
    const initials = name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
    avatarFall.textContent = initials;
    avatarFall.style.display = "flex";
    avatarImg.style.display = "none";
  }
}

function hideAvatar() {
  avatarWrap.classList.remove("visible");
  avatarImg.style.display = "none";
  avatarFall.style.display = "none";
  usernameEl.textContent = "";
}

function emailToKey(email) {
  return email.trim().toLowerCase().replace(/\./g, ",");
}

function setAccountsNotice(msg, cls = "admin-notice") {
  accountsNotice.textContent = msg;
  accountsNotice.className = cls;
}

async function loadAccounts() {
  accountsList.innerHTML = '<p style="color:#888;margin:0;">Chargement...</p>';
  try {
    const snap = await get(child(dbRef(rtdb), "admins"));
    if (!snap.exists()) {
      accountsList.innerHTML = '<p style="color:#888;margin:0;">Aucun compte.</p>';
      return;
    }

    accountsList.innerHTML = "";
    Object.entries(snap.val()).forEach(([key, data]) => {
      const email = key.replace(/,/g, ".");
      const row = document.createElement("div");
      row.style.cssText = "display:flex;justify-content:space-between;align-items:center;gap:0.75rem;padding:0.75rem 0.9rem;border:1px solid rgba(255,255,255,0.08);border-radius:6px;background:rgba(255,255,255,0.03);";
      row.innerHTML = `<div><div style="color:#fff;font-size:0.85rem;">${email}</div><div style="color:#888;font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;">${data.role || "admin"}</div></div>`;

      const del = document.createElement("button");
      del.type = "button";
      del.className = "admin-btn danger";
      del.style.width = "auto";
      del.textContent = "Supprimer";
      del.addEventListener("click", async () => {
        if (currentUserRole !== "superadmin") return;
        if (!confirm(`Supprimer ${email} ?`)) return;
        try {
          await remove(dbRef(rtdb, `admins/${key}`));
          setAccountsNotice("Compte supprimé.", "admin-notice success");
          await loadAccounts();
        } catch (err) {
          setAccountsNotice("Erreur : " + err.message, "admin-notice error");
        }
      });

      row.appendChild(del);
      accountsList.appendChild(row);
    });
  } catch (err) {
    accountsList.innerHTML = '<p style="color:#e74c3c;margin:0;">Erreur : ' + err.message + "</p>";
  }
}

onAuthStateChanged(auth, async user => {
  if (user) {
    showAvatar(user);
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";

    const emailKey = user.email.replace(/\./g, ",");
    const snap = await get(child(dbRef(rtdb), `admins/${emailKey}`));
    if (snap.exists()) {
      currentUserRole = snap.val().role;
      adminBtn.classList.add("visible");
      siteTextsBtn.classList.add("visible");
      if (currentUserRole === "superadmin") {
        accountsBtn.classList.add("visible");
      } else {
        accountsBtn.classList.remove("visible");
      }
    } else {
      currentUserRole = null;
      adminBtn.classList.remove("visible");
      siteTextsBtn.classList.remove("visible");
      accountsBtn.classList.remove("visible");
      adminPanel.classList.remove("open");
      siteTextsPanel.classList.remove("open");
      accountsModal.classList.remove("active");
    }
  } else {
    hideAvatar();
    currentUserRole = null;
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
    adminBtn.classList.remove("visible");
    siteTextsBtn.classList.remove("visible");
    accountsBtn.classList.remove("visible");
    adminPanel.classList.remove("open");
    siteTextsPanel.classList.remove("open");
    accountsModal.classList.remove("active");
  }
});

loginBtn.addEventListener("click", async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch {
    try { await signInWithRedirect(auth, provider); } catch { alert("Connexion impossible. Autorise les popups ou utilise la redirection."); }
  }
});

logoutBtn.addEventListener("click", () => signOut(auth));

const formationsContent = document.getElementById("formations-content");
const q = query(collection(db, "formations"), orderBy("ordre"));

onSnapshot(q, snapshot => {
  formationsContent.innerHTML = "";
  if (snapshot.empty) {
    formationsContent.innerHTML = '<p style="color:#555;text-align:center;padding:2rem 1rem;">Aucune formation pour l’instant.</p>';
    return;
  }

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const wrap = document.createElement("div");
    wrap.className = "formation-block holo-card";

    let html = "";
    const titleText = data.title || "Formations";
    const titleIcon = titleText.trim().startsWith("📌") ? "" : "📌 ";
    html += `<h4>${titleIcon}${titleText}</h4>`;

    if (data.note) {
      html += `<p class="formations-note">${data.note}</p>`;
    }

    const items = Array.isArray(data.items) ? data.items : [];
    if (items.length) {
      html += "<ul>";
      items.forEach(item => {
        html += `<li>${item}</li>`;
      });
      html += "</ul>";
    }

    if (data.extra) {
      html += `<div class="formations-extra">${data.extra}</div>`;
    }

    wrap.innerHTML = html;
    formationsContent.appendChild(wrap);
  });
}, err => {
  formationsContent.innerHTML = '<p style="color:#e74c3c;text-align:center;padding:2rem 1rem;">Erreur : ' + err.message + '</p>';
});

/* ---------------- Site-wide editable texts (nav, section header, reminder, footer) ---------------- */

const SITE_TEXTS_DOC = doc(db, "site_settings", "formations_page");

function renderNavLinks(links) {
  navLinksWrap.innerHTML = "";
  links.forEach(link => {
    const a = document.createElement("a");
    a.href = link.href || "#";
    a.textContent = link.label || "";
    if (link.href === CURRENT_PAGE) a.classList.add("active");
    navLinksWrap.appendChild(a);
  });
}

function renderNavLinksEditor(links) {
  navLinksEditor.innerHTML = "";
  links.forEach((link, idx) => {
    const row = document.createElement("div");
    row.className = "nav-link-row";
    row.innerHTML = `
      <input type="text" class="nav-link-label" placeholder="Libellé" value="${(link.label || "").replace(/"/g, '&quot;')}">
      <input type="text" class="nav-link-href" placeholder="page.html" value="${(link.href || "").replace(/"/g, '&quot;')}">
      <button type="button" class="remove-link-btn" title="Supprimer">&times;</button>
    `;
    row.querySelector(".remove-link-btn").addEventListener("click", () => {
      row.remove();
    });
    navLinksEditor.appendChild(row);
  });
}

function getNavLinksFromEditor() {
  const rows = navLinksEditor.querySelectorAll(".nav-link-row");
  const links = [];
  rows.forEach(row => {
    const label = row.querySelector(".nav-link-label").value.trim();
    const href = row.querySelector(".nav-link-href").value.trim();
    if (label && href) links.push({ label, href });
  });
  return links;
}

addNavLinkBtn.addEventListener("click", () => {
  const rows = navLinksEditor.querySelectorAll(".nav-link-row");
  const current = Array.from(rows).map(row => ({
    label: row.querySelector(".nav-link-label").value,
    href: row.querySelector(".nav-link-href").value
  }));
  current.push({ label: "", href: "" });
  renderNavLinksEditor(current);
});

function applySiteTexts(data) {
  const brand = data.brand || "408TH CORPS COSMIQUE";
  const sectionNumber = data.sectionNumber || "04";
  const sectionTitle = data.sectionTitle || "Formations Militaires";
  const reminder = data.reminder || "N'oubliez pas de demander à passer vos formations !";
  const footer = data.footer || "408TH CORPS COSMIQUE — USAGE INTERNE UNIQUEMENT";
  const links = Array.isArray(data.navLinks) && data.navLinks.length ? data.navLinks : DEFAULT_NAV_LINKS;

  navBrandText.textContent = brand;
  sectionNumberEl.textContent = sectionNumber;
  sectionTitleEl.textContent = sectionTitle;
  reminderTextEl.textContent = reminder;
  footerTextEl.textContent = footer;
  document.title = brand ? `${brand} - Formations` : document.title;
  renderNavLinks(links);

  // Sync edit form fields (only if panel isn't actively being edited mid-typing, harmless to overwrite on snapshot)
  stBrand.value = brand;
  stSectionNumber.value = sectionNumber;
  stSectionTitle.value = sectionTitle;
  stReminder.value = reminder;
  stFooter.value = footer;
  renderNavLinksEditor(links);
}

// Live default render before Firestore responds, so page isn't empty
applySiteTexts({});

onSnapshot(SITE_TEXTS_DOC, snap => {
  if (snap.exists()) {
    applySiteTexts(snap.data());
  }
}, err => {
  console.error("Erreur chargement textes du site :", err.message);
});

siteTextsBtn.addEventListener("click", () => {
  if (!currentUserRole) return;
  siteTextsPanel.classList.toggle("open");
});

siteTextsForm.addEventListener("submit", async e => {
  e.preventDefault();
  if (!currentUserRole) {
    siteTextsNotice.textContent = "Non autorisé.";
    siteTextsNotice.className = "admin-notice error";
    return;
  }

  const payload = {
    brand: stBrand.value.trim(),
    sectionNumber: stSectionNumber.value.trim(),
    sectionTitle: stSectionTitle.value.trim(),
    reminder: stReminder.value.trim(),
    footer: stFooter.value.trim(),
    navLinks: getNavLinksFromEditor()
  };

  try {
    await setDoc(SITE_TEXTS_DOC, payload, { merge: true });
    siteTextsNotice.textContent = "Textes du site mis à jour !";
    siteTextsNotice.className = "admin-notice success";
  } catch (err) {
    siteTextsNotice.textContent = "Erreur : " + err.message;
    siteTextsNotice.className = "admin-notice error";
  }
});

/* ---------------- Accounts modal ---------------- */

accountsBtn.addEventListener("click", async () => {
  if (currentUserRole !== "superadmin") return;
  accountsModal.classList.add("active");
  setAccountsNotice("");
  await loadAccounts();
});

closeAccountsModal.addEventListener("click", () => accountsModal.classList.remove("active"));
accountsModal.addEventListener("click", e => { if (e.target === accountsModal) accountsModal.classList.remove("active"); });

addAccountForm.addEventListener("submit", async e => {
  e.preventDefault();
  if (currentUserRole !== "superadmin") return;
  const email = newAccountEmail.value.trim().toLowerCase();
  if (!email) return;
  try {
    await set(dbRef(rtdb, `admins/${emailToKey(email)}`), { email, role: newAccountRole.value });
    setAccountsNotice("Compte ajouté.", "admin-notice success");
    newAccountEmail.value = "";
    await loadAccounts();
  } catch (err) {
    setAccountsNotice("Erreur : " + err.message, "admin-notice error");
  }
});

/* ---------------- Formations admin panel ---------------- */

const adminForm = document.getElementById("admin-form");
const editDocIdInp = document.getElementById("edit-doc-id");
const submitBtn = document.getElementById("admin-submit-btn");
const cancelEditBtn = document.getElementById("cancel-edit-btn");
const adminNotice = document.getElementById("admin-notice");
const aNumber = document.getElementById("a-number");
const aTitle = document.getElementById("a-title");
const aOrdre = document.getElementById("a-ordre");
const aType = document.getElementById("a-type");
const aNote = document.getElementById("a-note");
const aItems = document.getElementById("a-items");

function getFormData() {
  return {
    number: aNumber.value.trim(),
    title: aTitle.value.trim(),
    ordre: parseInt(aOrdre.value || Date.now(), 10),
    type: aType.value,
    subtitle: "",
    cols: "",
    note: aNote.value.trim(),
    items: aItems.value.split("\n").map(v => v.trim()).filter(Boolean)
  };
}

function fillForm(data, docId) {
  editDocIdInp.value = docId;
  aNumber.value = data.number || "04";
  aTitle.value = data.title || "Formations Militaires";
  aOrdre.value = data.ordre || 1;
  aType.value = data.type || "list";
  aNote.value = data.note || "";
  aItems.value = Array.isArray(data.items) ? data.items.join("\n") : "";
  submitBtn.textContent = "Enregistrer les modifications";
  cancelEditBtn.style.display = "block";
  adminPanel.classList.add("open");
}

function resetForm() {
  adminForm.reset();
  aNumber.value = "04";
  aTitle.value = "Formations Militaires";
  aOrdre.value = "1";
  aType.value = "list";
  aNote.value = "N'oubliez pas de demander à passer vos formations !";
  aItems.value = "";
  editDocIdInp.value = "";
  submitBtn.textContent = "Enregistrer";
  cancelEditBtn.style.display = "none";
  adminNotice.textContent = "";
  adminNotice.className = "admin-notice";
}

adminBtn.addEventListener("click", () => {
  if (!currentUserRole) return;
  adminPanel.classList.toggle("open");
});

adminForm.addEventListener("submit", async e => {
  e.preventDefault();
  if (!currentUserRole) {
    adminNotice.textContent = "Non autorisé.";
    adminNotice.className = "admin-notice error";
    return;
  }

  const data = getFormData();
  const docId = editDocIdInp.value;

  try {
    if (docId) {
      await updateDoc(doc(db, "formations", docId), data);
      adminNotice.textContent = "Formations mises à jour !";
    } else {
      await addDoc(collection(db, "formations"), data);
      adminNotice.textContent = "Formations enregistrées !";
    }
    adminNotice.className = "admin-notice success";
    resetForm();
  } catch (err) {
    adminNotice.textContent = "Erreur : " + err.message;
    adminNotice.className = "admin-notice error";
  }
});

cancelEditBtn.addEventListener("click", resetForm);
</script>
</body>
